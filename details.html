<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodWeather · Подробности</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="weather-background" id="bgLayer"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="header-top-row"><button class="menu-btn" id="menuBtn">☰</button></div>
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-section expanded">
                    <div class="menu-section-title"><span>Тема</span><span class="arrow">›</span></div>
                    <div class="menu-items">
                        <div class="menu-item" data-theme="light"><span>Светлая</span><span class="check">✓</span></div>
                        <div class="menu-item" data-theme="dark"><span>Тёмная</span><span class="check">✓</span></div>
                    </div>
                </div>
                <div class="menu-section expanded">
                    <div class="menu-section-title"><span>Эмодзи</span><span class="arrow">›</span></div>
                    <div class="menu-items">
                        <div class="menu-item" data-emoji="system"><span>Системные</span><span class="check">✓</span></div>
                        <div class="menu-item" data-emoji="fluent"><span>Fluent</span><span class="check">✓</span></div>
                    </div>
                </div>
            </div>
            <div class="header-content">
                <div class="location-row"><h1 class="city-name" id="cityDisplay">—</h1><span class="region-name" id="regionDisplay"></span></div>
                <div class="coordinates" id="coordsDisplay"></div>
                <div class="weather-status-row">
                    <div class="temp-section"><span class="temp-current" id="tempDisplay">--°</span><span class="feels-like" id="feelsLikeHeader">Ощущается как --°</span></div>
                    <span class="weather-desc" id="descDisplay">---</span>
                    <span class="update-badge" id="updateTimeDisplay"></span>
                </div>
            </div>
        </header>
        <div class="tabs-container">
            <div class="tabs"><a href="index.html" class="tab-btn">Прогноз</a><a href="details.html" class="tab-btn active">Подробности</a></div>
        </div>
        <main class="content-area">
            <div id="loadingUI" class="status-message"><div class="loader"></div><p>Загрузка...</p></div>
            <div id="detailsContent" class="details-section">
                <div class="details-grid">
                    <div class="detail-card"><div class="detail-label">Ощущается</div><div class="detail-value"><span id="feelsLikeDisplay">--</span><span class="detail-unit">°C</span></div></div>
                    <div class="detail-card"><div class="detail-label">Влажность</div><div class="detail-value"><span id="humidityDisplay">--</span><span class="detail-unit">%</span></div></div>
                    <div class="detail-card"><div class="detail-label">Ветер</div><div class="detail-value"><span id="windSpeedDisplay">--</span><span class="detail-unit">м/с</span></div><div id="windDirDisplay"></div></div>
                    <div class="detail-card"><div class="detail-label">Порывы</div><div class="detail-value"><span id="windGustDisplay">--</span><span class="detail-unit">м/с</span></div></div>
                    <div class="detail-card"><div class="detail-label">Облачность</div><div class="detail-value"><span id="cloudDisplay">--</span><span class="detail-unit">%</span></div></div>
                    <div class="detail-card"><div class="detail-label">Видимость</div><div class="detail-value"><span id="visibilityDisplay">--</span><span class="detail-unit">км</span></div></div>
                    <div class="detail-card"><div class="detail-label">Давление</div><div class="detail-value"><span id="pressureDisplay">--</span><span class="detail-unit">мм рт.ст.</span></div></div>
                    <div class="detail-card"><div class="detail-label">Осадки</div><div class="detail-value"><span id="precipDisplay">--</span><span class="detail-unit">мм</span></div></div>
                    <div class="detail-card"><div class="detail-label">Восход</div><div class="detail-value"><span id="sunriseDisplay">--:--</span></div></div>
                    <div class="detail-card"><div class="detail-label">Закат</div><div class="detail-value"><span id="sunsetDisplay">--:--</span></div></div>
                </div>
            </div>
            <div id="errorUI" class="status-message error" style="display:none"><p>Ошибка</p><p id="errorText"></p><button class="retry-btn" id="errorRetryBtn">Попробовать снова</button></div>
        </main>
    </div>
    <button class="refresh-btn" id="refreshBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"/>
            <path d="M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </button>
    <script src="js/common.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
