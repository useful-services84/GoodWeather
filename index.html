<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GoodWither · Прогноз погоды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background-color: #0b1a2a;
            transition: background-color 0.4s ease;
            color: white;
        }

        /* Фоновый слой — на весь экран */
        .weather-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            transition: background-image 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Затемнение для читаемости */
        .weather-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* Основной контейнер */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка (фиксированная) */
        .app-header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .location-row {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .city-name {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .region-name {
            font-size: 1.1rem;
            opacity: 0.8;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .coordinates {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 1rem;
            font-family: monospace;
        }

        .weather-status-row {
            display: flex;
            align-items: baseline;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .temp-current {
            font-size: 4rem;
            font-weight: 600;
            line-height: 1;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        .weather-desc {
            font-size: 1.8rem;
            font-weight: 400;
            opacity: 0.95;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.3);
        }

        .update-badge {
            margin-left: auto;
            font-size: 0.9rem;
            opacity: 0.7;
            align-self: flex-end;
        }

        /* Вкладки */
        .tabs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            width: 100%;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .tab-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: white;
            border-bottom-color: white;
        }

        /* Контент вкладок */
        .content-area {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Прогноз на неделю */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1.2rem 0.8rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        .forecast-day:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
        }

        .forecast-date {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .forecast-temp {
            font-size: 2rem;
            font-weight: 500;
            margin: 0.5rem 0;
        }

        .forecast-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.8rem;
        }

        .forecast-details {
            display: flex;
            justify-content: center;
            gap: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Подробная информация */
        .details-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-grid-large {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .detail-card {
            text-align: center;
        }

        .detail-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }

        .detail-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }

        .detail-value-large {
            font-size: 2.5rem;
            font-weight: 300;
        }

        .detail-unit {
            font-size: 1rem;
            opacity: 0.6;
            margin-left: 0.2rem;
        }

        /* Кнопка обновления */
        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(30deg);
        }

        /* Загрузка / ошибки */
        .status-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            font-size: 1.2rem;
            gap: 1rem;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #ffb3b3;
        }

        /* Адаптация */
        @media (max-width: 768px) {
            .app-header { padding: 1.5rem 1rem 1rem; }
            .content-area { padding: 1.5rem 1rem; }
            .tabs-container { padding: 0 1rem; }
            .city-name { font-size: 2rem; }
            .temp-current { font-size: 3rem; }
            .weather-desc { font-size: 1.3rem; }
            .update-badge { margin-left: 0; width: 100%; }
            .forecast-grid { grid-template-columns: repeat(2, 1fr); }
            .refresh-btn { bottom: 1rem; right: 1rem; }
        }

        @media (max-width: 480px) {
            .forecast-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="weather-background" id="bgLayer"></div>

    <div class="app-container">
        <!-- Шапка -->
        <header class="app-header">
            <div class="header-content">
                <div class="location-row">
                    <h1 class="city-name" id="cityDisplay">—</h1>
                    <span class="region-name" id="regionDisplay"></span>
                </div>
                <div class="coordinates" id="coordsDisplay"></div>
                
                <div class="weather-status-row">
                    <span class="temp-current" id="tempDisplay">--°</span>
                    <span class="weather-desc" id="descDisplay">---</span>
                    <span class="update-badge" id="updateTimeDisplay"></span>
                </div>
            </div>
        </header>

        <!-- Вкладки -->
        <div class="tabs-container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="forecast">📅 Прогноз на неделю</button>
                <button class="tab-btn" data-tab="details">📊 Подробности</button>
            </div>
        </div>

        <!-- Контент -->
        <main class="content-area">
            <!-- Загрузка -->
            <div id="loadingUI" class="status-message">
                <div class="loader"></div>
                <p>Определяем местоположение и загружаем погоду…</p>
            </div>

            <!-- Вкладка Прогноз -->
            <div id="forecastTab" class="tab-content active">
                <div id="forecastContent">
                    <div class="forecast-grid" id="forecastGrid"></div>
                </div>
            </div>

            <!-- Вкладка Подробности -->
            <div id="detailsTab" class="tab-content">
                <div id="detailsContent" class="details-section">
                    <div class="details-grid-large">
                        <div class="detail-card">
                            <div class="detail-icon">🌡️</div>
                            <div class="detail-label">Ощущается как</div>
                            <div class="detail-value-large">
                                <span id="feelsLikeDisplay">--</span><span class="detail-unit">°C</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon">💧</div>
                            <div class="detail-label">Влажность</div>
                            <div class="detail-value-large">
                                <span id="humidityDisplay">--</span><span class="detail-unit">%</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon">🌬️</div>
                            <div class="detail-label">Ветер</div>
                            <div class="detail-value-large">
                                <span id="windSpeedDisplay">--</span><span class="detail-unit">м/с</span>
                            </div>
                            <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 0.5rem;" id="windDirDisplay"></div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon">☁️</div>
                            <div class="detail-label">Облачность</div>
                            <div class="detail-value-large">
                                <span id="cloudDisplay">--</span><span class="detail-unit">%</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon">👁️</div>
                            <div class="detail-label">Видимость</div>
                            <div class="detail-value-large">
                                <span id="visibilityDisplay">--</span><span class="detail-unit">км</span>
                            </div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-icon">☀️</div>
                            <div class="detail-label">УФ-индекс</div>
                            <div class="detail-value-large">
                                <span id="uvDisplay">--</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ошибка -->
            <div id="errorUI" class="status-message error" style="display: none;">
                <p>⚠️</p>
                <p id="errorText">Не удалось загрузить данные</p>
                <button class="tab-btn" id="errorRetryBtn" style="color: white;">Попробовать снова</button>
            </div>
        </main>
    </div>

    <!-- Кнопка обновления -->
    <button class="refresh-btn" id="refreshBtn" title="Обновить">⟳</button>

    <script>
        (function(){
            "use strict";

            // ---------- КОНФИГУРАЦИЯ ФОНОВ ----------
            const WEATHER_BG_MAP = {
                clear: 'img/clear.jpg',
                partly_cloudy: 'img/partly-cloudy.jpg',
                cloudy: 'img/cloudy.jpg',
                fog: 'img/fog.jpg',
                rain: 'img/rain.jpg',
                snow: 'img/snow.jpg',
                thunderstorm: 'img/thunderstorm.jpg',
                default: 'img/default.jpg'
            };

            function getWeatherCategory(code) {
                if (code === 0) return 'clear';
                if (code === 1 || code === 2) return 'partly_cloudy';
                if (code === 3) return 'cloudy';
                if (code >= 45 && code <= 48) return 'fog';
                if (code >= 51 && code <= 67) return 'rain';
                if (code >= 71 && code <= 77) return 'snow';
                if (code >= 80 && code <= 82) return 'rain';
                if (code >= 85 && code <= 86) return 'snow';
                if (code >= 95) return 'thunderstorm';
                return 'default';
            }

            // DOM элементы
            const bgLayer = document.getElementById('bgLayer');
            const loadingUI = document.getElementById('loadingUI');
            const errorUI = document.getElementById('errorUI');
            const errorText = document.getElementById('errorText');
            
            const cityDisplay = document.getElementById('cityDisplay');
            const regionDisplay = document.getElementById('regionDisplay');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const tempDisplay = document.getElementById('tempDisplay');
            const descDisplay = document.getElementById('descDisplay');
            const updateTimeDisplay = document.getElementById('updateTimeDisplay');
            
            const forecastGrid = document.getElementById('forecastGrid');
            
            const feelsLikeDisplay = document.getElementById('feelsLikeDisplay');
            const humidityDisplay = document.getElementById('humidityDisplay');
            const windSpeedDisplay = document.getElementById('windSpeedDisplay');
            const windDirDisplay = document.getElementById('windDirDisplay');
            const cloudDisplay = document.getElementById('cloudDisplay');
            const visibilityDisplay = document.getElementById('visibilityDisplay');
            const uvDisplay = document.getElementById('uvDisplay');

            let currentLat = null;
            let currentLon = null;
            let currentWeatherCode = 0;

            // Переключение вкладок
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetTab = tab.dataset.tab;
                    
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    document.getElementById(targetTab + 'Tab').classList.add('active');
                });
            });

            // Обновление фона
            function updateBackground(code) {
                const category = getWeatherCategory(code);
                const imageUrl = WEATHER_BG_MAP[category] || WEATHER_BG_MAP.default;
                
                if (imageUrl) {
                    bgLayer.style.backgroundImage = `url('${imageUrl}')`;
                } else {
                    const fallbackColors = {
                        clear: 'linear-gradient(145deg, #4facfe 0%, #00f2fe 100%)',
                        partly_cloudy: 'linear-gradient(145deg, #6b8cce 0%, #b8c6db 100%)',
                        cloudy: 'linear-gradient(145deg, #5f6c7a 0%, #919ba7 100%)',
                        fog: 'linear-gradient(145deg, #b0bec5 0%, #cfd8dc 100%)',
                        rain: 'linear-gradient(145deg, #3a4e6b 0%, #5f7a9f 100%)',
                        snow: 'linear-gradient(145deg, #e0eaf5 0%, #b0c4de 100%)',
                        thunderstorm: 'linear-gradient(145deg, #2c3e50 0%, #4a6274 100%)',
                        default: 'linear-gradient(145deg, #2b5876 0%, #4e4376 100%)'
                    };
                    bgLayer.style.backgroundImage = fallbackColors[category] || fallbackColors.default;
                }
                currentWeatherCode = code;
            }

            function getWeatherDescription(code) {
                const map = {
                    0: 'Ясно', 1: 'Преимущественно ясно', 2: 'Переменная облачность',
                    3: 'Пасмурно', 45: 'Туман', 48: 'Изморозь',
                    51: 'Лёгкая морось', 53: 'Морось', 55: 'Сильная морось',
                    61: 'Небольшой дождь', 63: 'Дождь', 65: 'Сильный дождь',
                    71: 'Небольшой снег', 73: 'Снег', 75: 'Сильный снег',
                    80: 'Ливень', 81: 'Сильный ливень', 82: 'Очень сильный ливень',
                    85: 'Снегопад', 86: 'Сильный снегопад',
                    95: 'Гроза', 96: 'Гроза с градом', 99: 'Сильная гроза'
                };
                return map[code] || 'Неизвестно';
            }

            function getWindDirection(deg) {
                const directions = ['С', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
                return directions[Math.round(deg / 45) % 8];
            }

            function showLoading() {
                loadingUI.style.display = 'flex';
                document.getElementById('forecastTab').style.display = 'none';
                document.getElementById('detailsTab').style.display = 'none';
                errorUI.style.display = 'none';
            }

            function showContent() {
                loadingUI.style.display = 'none';
                document.getElementById('forecastTab').style.display = 'block';
                document.getElementById('detailsTab').style.display = 'none';
                errorUI.style.display = 'none';
                
                // Показываем активную вкладку
                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                document.getElementById(activeTab + 'Tab').style.display = 'block';
            }

            function showError(msg) {
                loadingUI.style.display = 'none';
                document.getElementById('forecastTab').style.display = 'none';
                document.getElementById('detailsTab').style.display = 'none';
                errorUI.style.display = 'flex';
                errorText.textContent = msg || 'Неизвестная ошибка';
            }

            async function requestLocation() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) {
                        reject(new Error('Геолокация не поддерживается'));
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
                        (err) => {
                            let msg = 'Не удалось получить геолокацию.';
                            if (err.code === 1) msg = 'Доступ к геолокации запрещён.';
                            else if (err.code === 2) msg = 'Местоположение недоступно.';
                            else if (err.code === 3) msg = 'Истекло время ожидания.';
                            reject(new Error(msg));
                        },
                        { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
                    );
                });
            }

            async function reverseGeocode(lat, lon) {
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=ru`;
                try {
                    const response = await fetch(url, {
                        headers: { 'User-Agent': 'GoodWitherApp/1.0' }
                    });
                    if (!response.ok) throw new Error('Ошибка геокодирования');
                    const data = await response.json();
                    
                    const address = data.address || {};
                    const city = address.city || address.town || address.village || address.municipality || '';
                    const state = address.state || address.region || '';
                    const country = address.country || '';
                    
                    return {
                        main: city || address.county || 'Неизвестный пункт',
                        region: [state, country].filter(Boolean).join(', '),
                        fullDisplay: data.display_name || `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`
                    };
                } catch (e) {
                    return {
                        main: 'Местоположение',
                        region: '',
                        fullDisplay: `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`
                    };
                }
            }

            async function fetchWeatherData(lat, lon) {
                // Текущая погода + прогноз на 7 дней
                const params = new URLSearchParams({
                    latitude: lat,
                    longitude: lon,
                    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,wind_speed_10m,wind_direction_10m,visibility,uv_index',
                    daily: 'weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max',
                    timezone: 'auto',
                    forecast_days: 7
                });

                const url = `https://api.open-meteo.com/v1/dwd-icon?${params.toString()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Ошибка API: ${response.status}`);
                return await response.json();
            }

            function updateUI(data, locationInfo) {
                const current = data.current;
                
                // Шапка
                cityDisplay.textContent = locationInfo.main;
                regionDisplay.textContent = locationInfo.region;
                coordsDisplay.textContent = `${currentLat.toFixed(4)}°, ${currentLon.toFixed(4)}°`;
                
                tempDisplay.textContent = `${Math.round(current.temperature_2m)}°C`;
                descDisplay.textContent = getWeatherDescription(current.weather_code);
                
                const updateTime = current.time ? new Date(current.time) : new Date();
                updateTimeDisplay.textContent = `Обновлено: ${updateTime.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}`;
                
                updateBackground(current.weather_code);
                
                // Подробности
                feelsLikeDisplay.textContent = Math.round(current.apparent_temperature);
                humidityDisplay.textContent = Math.round(current.relative_humidity_2m);
                windSpeedDisplay.textContent = current.wind_speed_10m.toFixed(1);
                windDirDisplay.textContent = getWindDirection(current.wind_direction_10m);
                cloudDisplay.textContent = Math.round(current.cloud_cover);
                visibilityDisplay.textContent = (current.visibility / 1000).toFixed(1);
                uvDisplay.textContent = current.uv_index?.toFixed(1) || '—';
                
                // Прогноз
                const daily = data.daily;
                forecastGrid.innerHTML = '';
                
                for (let i = 0; i < daily.time.length; i++) {
                    const date = new Date(daily.time[i]);
                    const dayName = i === 0 ? 'Сегодня' : date.toLocaleDateString('ru-RU', { weekday: 'short' });
                    const dayDate = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
                    
                    const card = document.createElement('div');
                    card.className = 'forecast-day';
                    card.innerHTML = `
                        <div class="forecast-date">${dayName}<br><span style="font-size: 0.8rem; opacity: 0.7;">${dayDate}</span></div>
                        <div class="forecast-desc">${getWeatherDescription(daily.weather_code[i])}</div>
                        <div class="forecast-temp">${Math.round(daily.temperature_2m_max[i])}°</div>
                        <div class="forecast-details">
                            <span>🌙 ${Math.round(daily.temperature_2m_min[i])}°</span>
                            <span>💨 ${daily.wind_speed_10m_max[i]?.toFixed(1) || '—'}</span>
                        </div>
                    `;
                    forecastGrid.appendChild(card);
                }
            }

            async function loadWeatherData() {
                showLoading();
                try {
                    const pos = await requestLocation();
                    currentLat = pos.lat;
                    currentLon = pos.lon;

                    const [locationInfo, weatherData] = await Promise.all([
                        reverseGeocode(currentLat, currentLon),
                        fetchWeatherData(currentLat, currentLon)
                    ]);
                    
                    updateUI(weatherData, locationInfo);
                    showContent();
                } catch (error) {
                    console.error(error);
                    showError(error.message);
                    bgLayer.style.backgroundImage = 'linear-gradient(145deg, #1e3c72, #2a5298)';
                }
            }

            // Обработчики
            document.getElementById('refreshBtn').addEventListener('click', loadWeatherData);
            document.getElementById('errorRetryBtn').addEventListener('click', loadWeatherData);

            // Запуск
            loadWeatherData();

            // Автообновление раз в 30 минут
            setInterval(() => {
                if (currentLat && currentLon && errorUI.style.display === 'none') {
                    loadWeatherData();
                }
            }, 30 * 60 * 1000);
        })();
    </script>
</body>
</html>
